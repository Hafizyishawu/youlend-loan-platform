{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ include "youlend.namespace" . }}
  labels:
    {{- include "youlend.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "youlend.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "youlend.frontend.selectorLabels" . | nindent 8 }}
        version: {{ .Values.frontend.image.tag | quote }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.frontend.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.frontend.securityContext.runAsUser }}
        fsGroup: {{ .Values.frontend.securityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: frontend
        image: {{ include "youlend.frontend.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.frontend.service.targetPort }}
          protocol: TCP
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.frontend.health.livenessProbe.path }}
            port: {{ .Values.frontend.service.targetPort }}
          initialDelaySeconds: {{ .Values.frontend.health.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.frontend.health.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.frontend.health.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.frontend.health.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.frontend.health.readinessProbe.path }}
            port: {{ .Values.frontend.service.targetPort }}
          initialDelaySeconds: {{ .Values.frontend.health.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.frontend.health.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.frontend.health.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.frontend.health.readinessProbe.failureThreshold }}
        securityContext:
          allowPrivilegeEscalation: {{ .Values.frontend.securityContext.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ .Values.frontend.securityContext.readOnlyRootFilesystem }}
          runAsNonRoot: {{ .Values.frontend.securityContext.runAsNonRoot }}
          runAsUser: {{ .Values.frontend.securityContext.runAsUser }}
          capabilities:
            drop:
              {{- toYaml .Values.frontend.securityContext.capabilities.drop | nindent 14 }}
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
      {{- if .Values.affinity.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: {{ .Values.affinity.podAntiAffinity.weight }}
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - frontend
              topologyKey: kubernetes.io/hostname
      {{- end }}
{{- end }}
