<mat-toolbar color="primary" class="navbar">
  <div class="navbar-content">
    <div class="navbar-brand">
      <mat-icon class="brand-icon">account_balance</mat-icon>
      <span class="brand-text" routerLink="/">YouLend Loan Manager</span>
    </div>

    <div class="navbar-actions">
      <ng-container *ngIf="isAuthenticated$ | async; else loggedOut">
        <button mat-button routerLink="/loans" routerLinkActive="active">
          <mat-icon>list</mat-icon>
          Loans
        </button>

        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <mat-icon>account_circle</mat-icon>
          <span *ngIf="user$ | async as user">{{ user.name }}</span>
        </button>

        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </ng-container>

      <ng-template #loggedOut>
        <button mat-raised-button color="accent" (click)="login()">
          <mat-icon>login</mat-icon>
          Login
        </button>
      </ng-template>
    </div>
  </div>
</mat-toolbar>
