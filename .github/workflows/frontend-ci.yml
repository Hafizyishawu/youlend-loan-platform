name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - master
      - develop
    paths:
      - 'frontend/**'

jobs:
  test:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: true
      
      - name: Run tests
        run: npm test -- --watch=false --code-coverage --browsers=ChromeHeadless
      
      - name: Create production environment file
        run: |
          cat > src/environments/environment.prod.template.ts << EOF
          export const environment = {
            production: true,
            demoMode: false,
            apiUrl: '${{ secrets.FRONTEND_API_URL }}',
            auth0: {
              domain: '${{ secrets.AUTH0_DOMAIN }}',
              clientId: '${{ secrets.AUTH0_CLIENT_ID }}',
              authorizationParams: {
                redirect_uri: '${{ secrets.FRONTEND_REDIRECT_URI }}'
              }
            }
          };
          EOF

      - name: Build
        run: npm run build -- --configuration production
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  bundle-analysis:
    name: Analyze Bundle Size
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build -- --configuration production --stats-json
      
      - name: Analyze bundle
        run: |
          npx webpack-bundle-analyzer dist/stats.json --mode static --report bundle-report.html --no-open
        continue-on-error: true
      
      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: frontend/bundle-report.html
        continue-on-error: true
