name: Deploy to Production

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (leave empty to use commit SHA)'
        required: false
        type: string

jobs:
  build-backend:
    name: Build Backend Image
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      service: backend
      dockerfile-path: ./backend/Dockerfile
      context: ./backend
      ecr-repository: youlend-backend
      image-tag: ${{ inputs.version || github.sha }}

  build-frontend:
    name: Build Frontend Image
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      service: frontend
      dockerfile-path: ./frontend/Dockerfile
      context: ./frontend
      ecr-repository: youlend-frontend
      image-tag: ${{ inputs.version || github.sha }}

  security-scan:
    name: Security Scan
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/youlend-backend:${{ inputs.version || github.sha }}'
          format: 'sarif'
          output: 'trivy-backend-prod.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/youlend-frontend:${{ inputs.version || github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend-prod.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend-prod.sarif'
      
      - name: Fail on critical vulnerabilities
        run: |
          if grep -q '"level": "error"' trivy-backend-prod.sarif trivy-frontend-prod.sarif; then
            echo "::error::Critical vulnerabilities found in production images"
            exit 1
          fi

  deploy-production:
    name: Deploy to Production
    needs: [build-backend, build-frontend, security-scan]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://youlend.certifiles.com
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name youlend-eks \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}
      
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'
      
      - name: Backup current deployment
        run: |
          mkdir -p backup
          helm get values youlend-loan-platform -n youlend > backup/values-backup.yaml || true
          kubectl get deployment backend -n youlend -o yaml > backup/backend-deployment.yaml || true
          kubectl get deployment frontend -n youlend -o yaml > backup/frontend-deployment.yaml || true
      
      - name: Deploy with Helm
        id: deploy
        run: |
          helm upgrade --install youlend-loan-platform ./infrastructure/helm/youlend \
            --namespace youlend \
            --create-namespace \
            --set backend.image.tag=${{ inputs.version || github.sha }} \
            --set frontend.image.tag=${{ inputs.version || github.sha }} \
            --set global.environment=production \
            --wait \
            --timeout 15m \
            --atomic \
            --cleanup-on-fail
      
      - name: Verify deployment
        run: |
          echo "Waiting for deployments to stabilize..."
          kubectl rollout status deployment/backend -n youlend --timeout=10m
          kubectl rollout status deployment/frontend -n youlend --timeout=10m
          
          echo "Checking pod health..."
          kubectl wait --for=condition=ready pod -l app=backend -n youlend --timeout=5m || true
          kubectl wait --for=condition=ready pod -l app=frontend -n youlend --timeout=5m || true
      
      - name: Run production smoke tests
        run: |
          # Wait for ingress propagation
          sleep 60
          
          # Test backend health directly
          echo "Testing backend health..."
          kubectl port-forward -n youlend deployment/backend 5000:8080 &
          PF_PID=$!
          sleep 5
          curl -f -m 30 http://localhost:5000/health/live || echo "Warning: Health check failed"
          kill $PF_PID || true
          
          # Test via domain
          echo "Testing via domain..."
          curl -f -m 30 https://youlend.certifiles.com/ || echo "Warning: Frontend check failed"
          
          echo "✓ Smoke tests completed"
      
      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pods" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n youlend >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ingress" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n youlend >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Rollback on failure
        if: failure() && steps.deploy.conclusion == 'failure'
        run: |
          echo "::error::Production deployment failed. Initiating rollback..."
          helm rollback youlend-loan-platform -n youlend --wait --timeout=10m || true
          
          echo "## ⚠️ Deployment Failed - Rollback Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment was automatically rolled back to the previous version." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recent Events:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get events -n youlend --sort-by='.lastTimestamp' | tail -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify deployment
        if: success()
        run: |
          echo "::notice::Production deployment successful for version ${{ inputs.version || github.sha }}"