name: Deploy to EKS

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infrastructure/helm/**'
      - 'infrastructure/k8s/**'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend Image
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      service: backend
      dockerfile-path: ./backend/Dockerfile
      context: ./backend
      ecr-repository: youlend-backend
      image-tag: ${{ github.sha }}

  build-frontend:
    name: Build Frontend Image
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      service: frontend
      dockerfile-path: ./frontend/Dockerfile
      context: ./frontend
      ecr-repository: youlend-frontend
      image-tag: ${{ github.sha }}

  deploy:
    name: Deploy to Production
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://youlend.certifiles.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name youlend-eks \
            --region us-east-1
      
      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes
      
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'
      
      - name: Deploy with Helm
        run: |
          cd infrastructure/helm
          
          helm upgrade --install youlend-loan-platform ./youlend \
            --namespace youlend \
            --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --wait \
            --timeout 10m
      
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend -n youlend --timeout=5m
          kubectl rollout status deployment/frontend -n youlend --timeout=5m
      
      - name: Get deployment info
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://youlend.certifiles.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n youlend >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n youlend >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ingress" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n youlend >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Run smoke tests
        run: |
          sleep 30
          
          echo "Testing production deployment..."
          curl -f -k https://youlend.certifiles.com/ || echo "⚠️  Frontend endpoint check (non-blocking)"
          
          echo "Deployment completed successfully"
          echo "Application live at: https://youlend.certifiles.com"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recent Events:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get events -n youlend --sort-by='.lastTimestamp' | tail -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: Automatic rollback on failure
        if: failure()
        run: |
          echo "::warning::Deployment failed - attempting automatic rollback"
          
          cd infrastructure/helm
          
          # Get current and previous revision numbers
          CURRENT=$(helm history youlend-loan-platform -n youlend --max 1 -o json | jq -r '.[0].revision')
          PREVIOUS=$((CURRENT - 1))
          
          # Check if previous revision exists and was successful
          if [ "$PREVIOUS" -gt 0 ]; then
            PREV_STATUS=$(helm history youlend-loan-platform -n youlend --max 50 -o json | jq -r ".[] | select(.revision == $PREVIOUS) | .status")
            
            if [ "$PREV_STATUS" = "deployed" ] || [ "$PREV_STATUS" = "superseded" ]; then
              echo "Rolling back from revision $CURRENT to revision $PREVIOUS (status: $PREV_STATUS)"
              helm rollback youlend-loan-platform $PREVIOUS -n youlend --wait --timeout=5m
              
              if [ $? -eq 0 ]; then
                echo "Successfully rolled back to revision $PREVIOUS"
                echo "::warning::Deployment failed but rollback successful - production is stable"
              else
                echo "::error::Rollback failed - manual intervention required"
              fi
            else
              echo "::warning::Previous revision $PREVIOUS had status '$PREV_STATUS' - skipping rollback"
              echo "Manual rollback recommended to a known good revision"
            fi
          else
            echo "::warning::No previous revision available for rollback"
          fi